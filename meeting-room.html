<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Room | NBA Awka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #1B365D; font-family: 'Inter', sans-serif; color: white; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .spinner {
            width: 60px; height: 60px; border: 4px solid #D4AF37;
            border-top-color: transparent; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 30px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { 
            display: inline-block; padding: 15px 40px; background: #D4AF37; 
            color: #1B365D; text-decoration: none; border-radius: 30px; 
            font-weight: bold; margin-top: 20px;
        }
        .btn:hover { background: #B8960C; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1>Launching NBA Awka Meeting...</h1>
        <p>Please wait while we prepare your secure meeting room</p>
        <a href="#" id="joinBtn" class="btn" style="display:none;">
            <i class="fas fa-video"></i> Click to Join Meeting
        </a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'nba-awka-meeting';
        const displayName = urlParams.get('name') || 'Guest';
        const meetingTitle = decodeURIComponent(urlParams.get('title') || 'NBA Awka Meeting');
        
        // Generate unique Jitsi room name
        const jitsiRoom = `NBA-Awka-${roomId}`;
        
        // Build Jitsi URL with all parameters
        const jitsiUrl = `https://meet.jit.si/${jitsiRoom}` +
            `#userInfo.displayName="${encodeURIComponent(displayName)}"` +
            `&config.prejoinPageEnabled=false` +
            `&config.startWithAudioMuted=false` +
            `&config.startWithVideoMuted=false` +
            `&interfaceConfig.SHOW_JITSI_WATERMARK=false` +
            `&interfaceConfig.SHOW_WATERMARK_FOR_GUESTS=false` +
            `&interfaceConfig.DEFAULT_BACKGROUND="#1B365D"` +
            `&interfaceConfig.TOOLBAR_BUTTONS="microphone,camera,closedcaptions,desktop,fullscreen,fodeviceselection,hangup,chat,recording,livestreaming,etherpad,settings,raisehand,videoquality,filmstrip,invite,feedback,stats,shortcuts,tileview,select-background,download"`;

        // Auto-redirect after 2 seconds, or show button
        setTimeout(() => {
            window.location.href = jitsiUrl;
        }, 2000);

        // Show manual join button as fallback
        document.getElementById('joinBtn').href = jitsiUrl;
        document.getElementById('joinBtn').style.display = 'inline-block';
        document.getElementById('spinner').style.display = 'none';
    </script>
</body>
</html>
